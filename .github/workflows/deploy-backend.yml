name: Deploy Backend (Koyeb)

on:
  push:
    branches:
      - main
    # Removed paths filter for initial testing to ensure triggers work
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and configure Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_TOKEN }}

      - name: Deploy to Koyeb
        run: |
          # Perintah ini mencoba redeploy (update). 
          # Jika service belum ada, ia akan mencoba membuat service baru.
          koyeb service redeploy cloudgazer/backend || \
          koyeb service create backend \
            --app cloudgazer \
            --git github.com/stayrelevantid/cloudgazer \
            --git-branch main \
            --git-workdir backend \
            --port 8080:http \
            --instance-type nano
