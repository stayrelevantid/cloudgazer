name: Deploy Frontend (Vercel)

on:
  push:
    branches:
      - main
    # Removed paths filter for initial testing to ensure triggers work
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy frontend --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
